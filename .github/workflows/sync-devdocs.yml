name: "Sync developer docs to staging"

# To go live, change WEBHOOK_URL below to:
# https://docs.magento-opensource.com/webhook/sync-docs
# That single URL swap is the only change needed for production.

env:
  WEBHOOK_URL: "https://docs-test.magento-opensource.com/webhook/sync-docs"

on:
  push:
    branches:
      - main

jobs:
  sync-devdocs:
    name: "Trigger developer docs webhook"
    runs-on: ubuntu-latest

    steps:
      - name: "Trigger devdocs sync webhook"
        run: |
          echo "Triggering developer docs sync..."

          # Generate the HMAC signature the webhook handler expects
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | cut -d' ' -f2)"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Developer docs sync triggered successfully"
          else
            echo "Developer docs sync failed"
            exit 1
          fi
